<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RC Flat Slab Bridge Rating</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>RC Flat Slab Bridge Load Rating</h1>
    <p class="subtitle">One-way strip equivalent LRFR-style rating with explicit rebar, structural steel, prestress, and CFRP strip reinforcement inputs.</p>

    <form id="ratingForm">
      <section>
        <h2>Geometry</h2>
        <div class="grid">
          <label>Span (ft)<input id="spanFt" type="number" step="0.1" /></label>
          <label>Strip width (in)<input id="stripWidthIn" type="number" step="0.1" /></label>
          <label>Slab thickness (in)<input id="slabThicknessIn" type="number" step="0.1" /></label>
        </div>
      </section>

      <section>
        <h2>Materials</h2>
        <div class="grid">
          <label>f'c (psi)<input id="fcPsi" type="number" step="1" /></label>
          <label>fy (psi)<input id="fyPsi" type="number" step="1" /></label>
        </div>
      </section>

      <section>
        <h2>Reinforcement</h2>
        <div class="grid">
          <label>Top bar size #<input id="topBarSize" type="number" step="1" /></label>
          <label>Top bar count<input id="topBarCount" type="number" step="1" /></label>
          <label>Top steel depth from top (in)<input id="topBarDepthIn" type="number" step="0.1" /></label>
          <label>Bottom bar size #<input id="bottomBarSize" type="number" step="1" /></label>
          <label>Bottom bar count<input id="bottomBarCount" type="number" step="1" /></label>
          <label>Bottom steel depth from top (in)<input id="bottomBarDepthIn" type="number" step="0.1" /></label>
          <label>Stirrup size #<input id="stirrupBarSize" type="number" step="1" /></label>
          <label>Stirrup legs<input id="stirrupLegs" type="number" step="1" /></label>
          <label>Stirrup spacing (in)<input id="stirrupSpacingIn" type="number" step="0.1" /></label>
        </div>
      </section>

      <section>
        <h2>Prestress and Retrofit Steel</h2>
        <div class="grid">
          <label>Prestress area Aps (in²)<input id="prestressAreaIn2" type="number" step="0.001" /></label>
          <label>Prestress depth from top (in)<input id="prestressDepthIn" type="number" step="0.1" /></label>
          <label>Prestress effective stress (psi)<input id="prestressStressPsi" type="number" step="1" /></label>
          <label>Structural steel area (in²)<input id="steelAreaIn2" type="number" step="0.001" /></label>
          <label>Structural steel depth from top (in)<input id="steelDepthIn" type="number" step="0.1" /></label>
          <label>Structural steel yield (psi)<input id="steelYieldPsi" type="number" step="1" /></label>
        </div>
      </section>

      <section>
        <h2>CFRP Bottom Strips (Varying Width)</h2>
        <label>Strip JSON (array of {id, widthIn, thicknessIn, count, depthIn, effectiveStressPsi, ultimateStressPsi})
          <textarea id="cfrpStripsJson" rows="7"></textarea>
        </label>
      </section>

      <section>
        <h2>Loads</h2>
        <div class="grid">
          <label>Dead load DC (kip/ft)<input id="dcKipPerFt" type="number" step="0.01" /></label>
          <label>Dead load DW (kip/ft)<input id="dwKipPerFt" type="number" step="0.01" /></label>
          <label>Dead negative moment factor<input id="deadNegativeFactor" type="number" step="0.01" /></label>
          <label>Design truck<select id="designTruckCode"></select></label>
          <label>HL-93 rear spacing (ft)<input id="designRearSpacingFt" type="number" step="0.1" /></label>
          <label>Lane load (kip/ft)<input id="laneLoadKipPerFt" type="number" step="0.01" /></label>
          <label>Permit lane load (kip/ft)<input id="permitLaneLoadKipPerFt" type="number" step="0.01" /></label>
          <label>Impact factor<input id="impact" type="number" step="0.01" /></label>
          <label>Distribution factor<input id="distributionFactor" type="number" step="0.01" /></label>
          <label>Live negative moment factor<input id="liveNegativeFactor" type="number" step="0.01" /></label>
        </div>
        <label>Permit Truck Axles JSON (array of {weight, position})
          <textarea id="permitTruckAxles" rows="6"></textarea>
        </label>
      </section>

      <section>
        <h2>Deterioration (0 to 100%)</h2>
        <div class="grid">
          <label>Rebar loss %<input id="rebarLossPercent" type="number" step="0.1" min="0" max="100" /></label>
          <label>Structural steel loss %<input id="steelLossPercent" type="number" step="0.1" min="0" max="100" /></label>
          <label>Prestress loss %<input id="prestressLossPercent" type="number" step="0.1" min="0" max="100" /></label>
          <label>CFRP loss %<input id="cfrpLossPercent" type="number" step="0.1" min="0" max="100" /></label>
        </div>
      </section>

      <div class="actions">
        <button type="button" id="btnDefaults">Load Example</button>
        <button type="submit">Run Rating</button>
      </div>
    </form>

    <section id="output"></section>
  </main>

  <script src="../bridge-live-load/trucks.js"></script>
  <script src="../bridge-live-load/analysis.js"></script>
  <script src="rating-engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
