<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rc Flat Slab Rating</title>
    <link rel="stylesheet" href="../_shared/strinteg-ui/colors_and_type.css" />
    <link rel="stylesheet" href="../_shared/strinteg-ui/base.css" />
    <link rel="stylesheet" href="../_shared/strinteg-ui/components.css" />
  </head>
  <body>
    <!-- STRINTEG_STARTER_TEMPLATE_V1 -->
    <div class="si-page">
      <header id="si-header"></header>
      <main class="si-main">
        <section class="si-grid si-grid-2">
          <article class="si-card">
            <h2>Inputs</h2>
            <form class="si-form" onsubmit="return false;">
              <div class="si-form-row">
                <label class="si-label" for="load-source">Live load basis</label>
                <select id="load-source" class="si-select"></select>
              </div>
              <div class="si-form-row">
                <label class="si-label" for="legal-truck">Truck selection</label>
                <select id="legal-truck" class="si-select"></select>
              </div>
              <div class="si-form-row">
                <label class="si-label" for="steel-pct">steelPct (%)</label>
                <input id="steel-pct" class="si-input" type="number" min="0" max="95" step="0.5" value="8" />
              </div>
              <div class="si-form-row">
                <label class="si-label" for="rebar-pct">rebarPct (%)</label>
                <input id="rebar-pct" class="si-input" type="number" min="0" max="95" step="0.5" value="6" />
              </div>
              <div class="si-form-row">
                <label class="si-label" for="prestress-pct">prestressPct (%)</label>
                <input id="prestress-pct" class="si-input" type="number" min="0" max="95" step="0.5" value="4" />
              </div>
              <button id="run-eval" type="button" class="si-button">Run</button>
            </form>
          </article>
          <article class="si-card">
            <h2>Summary</h2>
            <div id="summary-alert" class="si-alert">NC legal-load module is wired through shared app controls.</div>
          </article>
        </section>
        <section class="si-card">
          <h2>Output Table</h2>
          <div class="si-table-wrap">
            <table class="si-table">
              <thead><tr><th>Metric</th><th>Value</th></tr></thead>
              <tbody id="output-table-body"></tbody>
            </table>
          </div>
        </section>
      </main>
      <footer id="si-footer"></footer>
    </div>
    <script src="../_shared/strinteg-ui/shell.js"></script>
    <script src="../_shared/load-trucks/nc-noninterstate-fig6-147.js"></script>
    
    <script src="../_shared/load-trucks/rating-app-adoption.js"></script>
    <script>
      window.StrintegShell.mountShell({
        title: "Rc Flat Slab Rating",
        subtitle: "NC legal load truck adoption via shared module",
        badge: "STR-67",
        footer: "Shared Strinteg shell in use"
      });

      window.StrintegRatingApp.mount({
        appId: "rc-flat-slab-rating",
        materialUse: {"steel":false,"rebar":true,"prestress":false}
      });
    </script>
  </body>
</html>
