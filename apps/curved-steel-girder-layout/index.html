<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curved Steel Girder Layout Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Curved Steel Girder Layout Tool</h1>
    <p class="subtitle">Generate concentric girder geometry and MDX Software ASCII input files for downstream load-rating setup.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Inputs</h2>

      <div class="grid two-col">
        <label>Project name (MDX Software)
          <input id="projectName" type="text" value="CURVED_4G_3SPAN_R900">
        </label>
        <label>MDX Software version assumption
          <input id="mdxSoftwareVersion" type="text" value="MDX-2025.1-ASSUMED">
        </label>
      </div>
      <div class="grid one-col">
        <label>Generated-at timestamp (optional ISO8601 for deterministic output)
          <input id="generatedAt" type="text" value="2026-04-27T00:00:00.000Z">
        </label>
      </div>

      <div class="grid three-col">
        <label>Centerline radius (ft)
          <input id="radiusFt" type="number" step="0.1" value="900">
        </label>
        <label>Central angle (deg)
          <input id="centralAngleDeg" type="number" step="0.01" value="30">
        </label>
        <label>Curve direction
          <select id="curveDirection">
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </label>
      </div>

      <div class="grid three-col">
        <label>Girder count
          <input id="girderCount" type="number" step="1" min="1" value="4">
        </label>
        <label>Girder spacing (ft)
          <input id="girderSpacingFt" type="number" step="0.1" value="10">
        </label>
        <label>Station interval (ft)
          <input id="stationIntervalFt" type="number" step="0.1" value="30">
        </label>
      </div>
      <div class="grid three-col">
        <label>Steel section loss (%)
          <input id="steelSectionLossPercent" type="number" step="0.1" min="0" max="100" value="0">
        </label>
        <label>Rebar section loss (%)
          <input id="rebarSectionLossPercent" type="number" step="0.1" min="0" max="100" value="0">
        </label>
        <label>Prestress section loss (%)
          <input id="prestressSectionLossPercent" type="number" step="0.1" min="0" max="100" value="0">
        </label>
      </div>

      <div class="actions">
        <button id="runBtn">Generate Layout</button>
        <button id="importBtn" type="button">Import MDX Software Input</button>
        <button id="copyBtn" type="button">Copy MDX Software Input</button>
      </div>

      <p id="status" class="status">Ready.</p>
    </section>

    <section class="panel">
      <h2>Summary</h2>
      <div id="summary" class="summary-block">No layout generated yet.</div>
    </section>
    <section class="panel">
      <h2>Plan Preview</h2>
      <svg id="planPreview" class="preview-svg" viewBox="0 0 920 260" aria-label="Curved girder plan preview"></svg>
      <p class="station-labels"><strong>Station labels:</strong> <span id="stationLabels">-</span></p>
    </section>

    <section class="panel">
      <h2>MDX Software Input (.dat/.txt)</h2>
      <textarea id="mdxOutput" rows="18" readonly></textarea>
    </section>
  </main>

  <script src="layout-engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
